<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeAlgo Product · Daily Report</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: #0f172a;
      color: #f8fafc;
      padding: 1.25rem 2rem;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .header-logo {
      width: 2rem;
      height: 2rem;
      background: #3b82f6;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.8rem;
      letter-spacing: -0.02em;
      color: #fff;
      flex-shrink: 0;
    }
    .header-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: #f8fafc;
    }
    .header-subtitle {
      font-size: 0.82rem;
      color: #94a3b8;
      margin-top: 0.1rem;
    }
    .header-meta {
      font-size: 0.82rem;
      color: #64748b;
      text-align: right;
    }

    /* Sprint status bar */
    .sprint-bar {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .sprint-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e2e8f0;
    }
    .sprint-stats {
      font-size: 0.82rem;
      color: #94a3b8;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.25rem 0.65rem;
      border-radius: 99px;
    }
    .status-badge.on-track  { background: #052e16; color: #4ade80; }
    .status-badge.behind    { background: #450a0a; color: #f87171; }
    .status-badge.warning   { background: #431407; color: #fb923c; }
    .status-badge.no-sprint { background: #1e293b; color: #94a3b8; }

    /* ── Date history bar ── */
    .date-bar-wrap {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 0.6rem 2rem;
      overflow-x: auto;
      white-space: nowrap;
    }
    .date-bar {
      display: inline-flex;
      gap: 0.4rem;
    }
    .date-chip {
      display: inline-block;
      padding: 0.3rem 0.75rem;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      background: #f1f5f9;
      color: #64748b;
      border: 1px solid #e2e8f0;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .date-chip:hover { background: #e2e8f0; color: #334155; }
    .date-chip.active { background: #1e40af; color: #fff; border-color: #1e40af; }

    /* ── Main content ── */
    .main {
      max-width: 860px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
    }

    /* ── Module cards ── */
    .module-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .module-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.1rem;
      border-bottom: 1px solid #f1f5f9;
      gap: 0.75rem;
    }
    .module-title {
      font-size: 0.93rem;
      font-weight: 600;
      color: #1e293b;
    }
    .module-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-ok, .dot-on_track            { background: #22c55e; }
    .dot-warning                       { background: #f59e0b; }
    .dot-behind, .dot-critical         { background: #ef4444; }

    .module-body {
      padding: 0.85rem 1.1rem;
    }
    .bullet-list {
      list-style: none;
      padding: 0;
    }
    .bullet-list li {
      font-size: 0.9rem;
      color: #334155;
      padding: 0.3rem 0 0.3rem 1.3rem;
      position: relative;
      line-height: 1.5;
      border-bottom: 1px solid #f8fafc;
    }
    .bullet-list li:last-child { border-bottom: none; }
    .bullet-list li::before {
      content: '·';
      position: absolute;
      left: 0.3rem;
      color: #94a3b8;
      font-size: 1.2rem;
      line-height: 1.2;
    }

    /* ── Empty / loading states ── */
    .state-box {
      text-align: center;
      padding: 3rem 1rem;
      color: #94a3b8;
      font-size: 0.9rem;
    }
    .state-box .state-icon { font-size: 2rem; margin-bottom: 0.75rem; }
    .state-box .state-title { font-weight: 600; color: #64748b; margin-bottom: 0.25rem; }

    .spec-link {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #94a3b8;
    }
    .spec-link a { color: #64748b; text-decoration: none; }
    .spec-link a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .header { padding: 1rem; }
      .date-bar-wrap { padding: 0.5rem 1rem; }
      .main { padding: 1rem 0.75rem 2rem; }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div class="header-brand">
      <div class="header-logo">TA</div>
      <div>
        <div class="header-title">TradeAlgo Product</div>
        <div class="header-subtitle">Daily Sprint Report</div>
      </div>
    </div>
    <div class="header-meta" id="header-meta">—</div>
  </div>
  <div class="sprint-bar" id="sprint-bar">
    <span class="sprint-name" id="sprint-name">Loading...</span>
    <div class="sprint-stats" id="sprint-stats"></div>
    <span class="status-badge no-sprint" id="sprint-badge">—</span>
  </div>
</div>

<!-- Date history bar -->
<div class="date-bar-wrap">
  <div class="date-bar" id="date-bar">
    <span style="font-size:0.8rem;color:#94a3b8;padding:0.3rem 0;">Loading history...</span>
  </div>
</div>

<!-- Main -->
<div class="main" id="main">
  <div class="state-box">
    <div class="state-icon">📋</div>
    <div class="state-title">Loading report...</div>
  </div>
</div>

<div class="spec-link">
  <a href="/spec.html">View API spec →</a>
</div>

<script>
  const STATUS_LABEL = { on_track: 'On Track', behind: 'Behind', warning: 'At Risk', ok: 'Healthy', critical: 'Critical' };

  function formatDate(dateStr) {
    // dateStr = YYYY-MM-DD
    const [y, m, d] = dateStr.split('-').map(Number);
    const dt = new Date(y, m - 1, d);
    return dt.toLocaleDateString('en-SG', { weekday: 'short', day: 'numeric', month: 'short' });
  }

  function pct(n) { return `${(n * 100).toFixed(1)}%`; }

  let allDates = [];
  let currentDate = null;

  async function fetchJSON(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`${res.status} ${url}`);
    return res.json();
  }

  function renderDateBar(dates, active) {
    const bar = document.getElementById('date-bar');
    if (!dates.length) { bar.innerHTML = '<span style="font-size:0.8rem;color:#94a3b8;padding:0.3rem 0;">No reports yet</span>'; return; }
    bar.innerHTML = dates.map(d =>
      `<button class="date-chip${d === active ? ' active' : ''}" onclick="loadReport('${d}')">${formatDate(d)}</button>`
    ).join('');
  }

  function renderHeader(report) {
    const s = report.sprint;
    document.getElementById('sprint-name').textContent = s?.name ?? 'No active sprint';
    document.getElementById('header-meta').textContent =
      `Generated ${new Date(report.generated_at).toLocaleString('en-SG', { timeZone: 'Asia/Singapore', hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short' })} SGT`;

    if (s) {
      const doneRate = pct(s.completion_rate);
      const days = s.days_remaining;
      document.getElementById('sprint-stats').innerHTML =
        `<span>${s.total_issues} tickets</span><span>${doneRate} done</span><span>${days} day${days !== 1 ? 's' : ''} remaining</span>`;

      const badge = document.getElementById('sprint-badge');
      const state = s.on_track ? 'on-track' : 'behind';
      badge.className = `status-badge ${state}`;
      badge.textContent = s.on_track ? '✓ On Track' : '⚠ Behind';
    }
  }

  function renderModules(modules) {
    const main = document.getElementById('main');
    if (!modules?.length) {
      main.innerHTML = '<div class="state-box"><div class="state-icon">📭</div><div class="state-title">No module data in this report</div></div>';
      return;
    }

    main.innerHTML = modules.map(mod => {
      const dotClass = `dot-${mod.status ?? 'ok'}`;
      const bullets = (mod.bullets ?? []).map(b => `<li>${escapeHtml(b)}</li>`).join('');
      return `
        <div class="module-card">
          <div class="module-header">
            <span class="module-title">${escapeHtml(mod.title)}</span>
            <span class="module-status-dot ${dotClass}" title="${STATUS_LABEL[mod.status] ?? mod.status}"></span>
          </div>
          <div class="module-body">
            <ul class="bullet-list">${bullets || '<li>No data for this module today.</li>'}</ul>
          </div>
        </div>`;
    }).join('');
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function loadReport(date) {
    currentDate = date;
    renderDateBar(allDates, date);

    const main = document.getElementById('main');
    main.innerHTML = '<div class="state-box"><div class="state-icon">⏳</div><div class="state-title">Loading...</div></div>';

    try {
      const report = await fetchJSON(`/reports/${date}.json`);
      renderHeader(report);
      renderModules(report.modules);
    } catch (err) {
      main.innerHTML = `<div class="state-box"><div class="state-icon">⚠️</div><div class="state-title">Could not load report for ${formatDate(date)}</div><div>${err.message}</div></div>`;
    }
  }

  async function init() {
    try {
      allDates = await fetchJSON('/reports/index.json');
    } catch {
      allDates = [];
    }

    if (!allDates.length) {
      renderDateBar([], null);
      document.getElementById('sprint-name').textContent = 'No reports yet';
      document.getElementById('main').innerHTML = `
        <div class="state-box">
          <div class="state-icon">🕐</div>
          <div class="state-title">No reports generated yet</div>
          <div>The first report will appear after the GitHub Actions workflow runs at 9 PM SGT on a weekday.</div>
        </div>`;
      return;
    }

    await loadReport(allDates[0]);
  }

  init();
</script>
</body>
</html>
